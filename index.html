<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro_Aireadores</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#4a76c0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* --- ESTRUCTURA CRÍTICA --- */
        * { box-sizing: border-box; }
        
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background-color: #4a76c0; 
            font-family: Arial, sans-serif; 
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            height: 100%; 
            margin: 0 auto; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            color: white; 
        }

        /* --- ELEMENTOS DE LA INTERFAZ --- */
        .gps-status-bar, .server-status-bar, .grid-row {
            flex-shrink: 0; 
        }

        .content-area { 
            background-color: #1a3a70; 
            border: 1px solid white; 
            border-radius: 5px; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            min-height: 0; 
            margin-top: 5px;
            margin-bottom: 10px; 
            padding: 15px 10px;
        }

        .save-btn { 
            background-color: #ffffff; 
            color: #4e7a3a; 
            border: 2px solid white; 
            padding: 15px; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer; 
            text-transform: uppercase; 
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3); 
            flex-shrink: 0; 
            height: 60px;   
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- ESTILOS DECORATIVOS --- */
        .gps-status-bar { background: rgba(0,0,0,0.5); color: #00ff2b; font-size: 10px; padding: 5px; border-radius: 5px; margin-bottom: 5px; display: flex; justify-content: space-between; border: 1px solid rgba(255,255,255,0.2); }
        .gps-searching { color: #ffcc00; }
        .server-status-bar { padding: 12px; margin-bottom: 8px; border-radius: 5px; font-weight: bold; font-size: 14px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.3); transition: background-color 0.3s ease; text-align: center; }
        .server-loading { background-color: #ff9800; color: white; }
        .server-online { background-color: #28a745; color: white; }
        .server-offline { background-color: #dc3545; color: white; }
        .server-syncing { background-color: #007bff; color: white; }
        
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; width: 100%; }
        .label-box { border: 1px solid white; padding: 8px; font-size: 14px; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); height: 40px; }
        
        select, input[type="text"] { width: 100%; padding: 8px; border: 1px solid #1a3a70; background-color: white; height: 45px; font-weight: bold; font-size: 16px; color: black; }
        
        .form-mantenimiento-row { display: grid; grid-template-columns: 1fr 2fr; margin-bottom: 12px; gap: 2px; }
        .form-label { background-color: #4a76c0; border: 1px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .form-title { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; border-bottom: 1px solid white; padding-bottom: 10px;}
    </style>
</head>
<body onload="iniciarSistema()">
    <div class="container">
        <div class="gps-status-bar" id="gpsBar">
            <span id="gpsLabel">📍 GPS: BUSCANDO SEÑAL...</span>
            <span id="gpsCoords">---, ---</span>
        </div>

        <div id="serverStatus" class="server-status-bar server-loading">
            🟠 CONECTANDO CON SERVIDOR...
        </div>

        <input type="hidden" id="tempLat" value="0.000000">
        <input type="hidden" id="tempLon" value="0.000000">
        
        <div class="grid-row">
            <div id="txtHora" class="label-box">--:--:--</div>
            <div id="txtFecha" class="label-box">--/--/----</div>
        </div>

        <div class="content-area">
            <div class="form-title">REGISTRO DE NUEVO EQUIPO</div>
            
            <div class="form-mantenimiento-row">
                <div class="form-label">MARCA</div>
                <div>
                    <select id="new_marca" onchange="guardarBorradorFormulario()">
                        <option value=""></option>
                        <option value="GPS">GPS</option>
                        <option value="ECUASINO">ECUASINO</option>
                        <option value="COSUMISA">COSUMISA</option>
                        <option value="MOAF MADAM">MOAF MADAM</option>
                        <option value="CHANGFA">CHANGFA</option>
                    </select>
                </div>
            </div>
            <div class="form-mantenimiento-row">
                <div class="form-label">MODELO</div>
                <div>
                    <select id="new_modelo" onchange="guardarBorradorFormulario()">
                        <option value=""></option>
                        <option value="2 HP">2 HP</option>
                        <option value="3 HP">3 HP</option>
                        <option value="3.5 HP">3.5 HP</option>
                        <option value="4 HP">4 HP</option>
                        <option value="5 HP">5 HP</option>
                        <option value="5.5 HP">5.5 HP</option>
                        <option value="6 HP">6 HP</option>
                        <option value="16 HP">16 HP</option>
                    </select>
                </div>
            </div>
            <div class="form-mantenimiento-row">
                <div class="form-label">SERIE</div>
                <div><input type="text" id="new_serie" oninput="guardarBorradorFormulario()"></div>
            </div>
            <div class="form-mantenimiento-row">
                <div class="form-label">TIPO</div>
                <div>
                    <select id="new_tipo" onchange="actualizarPrefijoID(); guardarBorradorFormulario()">
                        <option value=""></option>
                        <option value="ELECTRICO">ELECTRICO</option>
                        <option value="MECANICO">MECANICO</option>
                    </select>
                </div>
            </div>
            <div class="form-mantenimiento-row">
                <div class="form-label">UBICACION</div>
                <div>
                    <select id="new_ubicacion" onchange="guardarBorradorFormulario()">
                        </select>
                </div>
            </div>
            <div class="form-mantenimiento-row">
                <div class="form-label">ID_AIR</div>
                <div><input type="text" id="new_id_air" oninput="guardarBorradorFormulario()"></div>
            </div>
        </div>

        <button class="save-btn" onclick="confirmarRegistro()">GUARDAR AIREADOR</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxGLuClr5EfG0Yx8Sp1uxf6HN0qvcnGxmmn8GfXb8FAdr05lIt96OOJkJi0NVKksq8e/exec";

        let ultimaLat = "0.000000", ultimaLon = "0.000000";
        let wb; 
        let datosAires = []; 

        // --- CARGA DE PISCINAS ESTÁTICAS ---
        function cargarPiscinasPorDefecto() {
            const select = document.getElementById('new_ubicacion');
            select.innerHTML = '<option value="">-- SELECCIONE --</option>';
            
            // Generar PRECRIA 1 al 44
            for(let i = 1; i <= 44; i++) {
                let o = document.createElement('option');
                o.value = "PRECRIA " + i; o.textContent = "PRECRIA " + i;
                select.appendChild(o);
            }
            // Generar PISCINA 1 al 95
            for(let i = 1; i <= 95; i++) {
                let o = document.createElement('option');
                o.value = "PISCINA " + i; o.textContent = "PISCINA " + i;
                select.appendChild(o);
            }
        }

        // --- FUNCIONES PARA AUTO-GUARDADO DE BORRADORES ---
        function guardarBorradorFormulario() {
            const borrador = {
                marca: document.getElementById('new_marca').value,
                modelo: document.getElementById('new_modelo').value,
                serie: document.getElementById('new_serie').value,
                tipo: document.getElementById('new_tipo').value,
                ubicacion: document.getElementById('new_ubicacion').value,
                id_air: document.getElementById('new_id_air').value
            };
            localStorage.setItem('borradorNuevoAireador', JSON.stringify(borrador));
        }

        setInterval(guardarBorradorFormulario, 5000);

        function restaurarBorradorFormulario() {
            const borradorGuardado = localStorage.getItem('borradorNuevoAireador');
            if (borradorGuardado) {
                try {
                    const b = JSON.parse(borradorGuardado);
                    document.getElementById('new_marca').value = b.marca || "";
                    document.getElementById('new_modelo').value = b.modelo || "";
                    document.getElementById('new_serie').value = b.serie || "";
                    document.getElementById('new_tipo').value = b.tipo || "";
                    document.getElementById('new_ubicacion').value = b.ubicacion || "";
                    document.getElementById('new_id_air').value = b.id_air || "";
                } catch(e) {}
            }
        }

        // --- PROTECCIÓN CONTRA CIERRES Y RECARGAS ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.metaKey && e.key === 'r')) {
                e.preventDefault();
                alert("⛔ RECARGA BLOQUEADA\n\nLos datos se guardan en memoria temporal.\nNo recargues para mantener la sincronización.");
            }
        });

        window.addEventListener('beforeunload', (event) => {
            guardarBorradorFormulario();
            const mensaje = "⚠️ ¿Seguro que deseas salir?";
            event.preventDefault();
            event.returnValue = mensaje;
            return mensaje;
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                guardarBorradorFormulario();
            }
        });

        const delay = ms => new Promise(res => setTimeout(res, ms));

        window.addEventListener('online', async () => {
            const statusDiv = document.getElementById('serverStatus');
            const pendientes = localStorage.getItem('pendingPayloads');
            
            if (pendientes && JSON.parse(pendientes).length > 0) {
                statusDiv.innerText = "🌐 INTERNET: SINCRONIZANDO...";
                statusDiv.className = "server-status-bar server-syncing";
                await delay(3000); 
                autoSyncPendientes();
            } else {
                statusDiv.innerText = "🟢 CONEXION OK";
                statusDiv.className = "server-status-bar server-online";
            }
        });

        window.addEventListener('offline', () => {
            const statusDiv = document.getElementById('serverStatus');
            statusDiv.innerText = "⚠️ MODO OFFLINE (Borrador Activo)";
            statusDiv.className = "server-status-bar server-offline";
        });

        async function iniciarSistema() {
            cargarPiscinasPorDefecto(); // 1. Cargar las piscinas al instante
            restaurarBorradorFormulario(); // 2. Llenar si hay datos guardados
            gestionarGPSPersistente(); // 3. Encender GPS
            await cargarDatos(); // 4. Intentar descargar DB en segundo plano
        }

        async function autoSyncPendientes() {
            const pendientes = localStorage.getItem('pendingPayloads');
            if (pendientes) {
                const statusDiv = document.getElementById('serverStatus');
                statusDiv.innerText = "🔵 ENVIANDO REGISTROS PENDIENTES...";
                statusDiv.className = "server-status-bar server-syncing";
                
                const cola = JSON.parse(pendientes);
                while (cola.length > 0) {
                    const item = cola[0];
                    try {
                        await fetch(SCRIPT_URL, {
                            method: "POST",
                            mode: "no-cors",
                            headers: { "Content-Type": "text/plain" },
                            body: JSON.stringify(item)
                        });
                        cola.shift(); 
                        localStorage.setItem('pendingPayloads', JSON.stringify(cola));
                    } catch (e) {
                        break; 
                    }
                }
                if (cola.length === 0) {
                    localStorage.removeItem('pendingPayloads');
                    statusDiv.innerText = "🟢 SINCRONIZACIÓN EXITOSA";
                    statusDiv.className = "server-status-bar server-online";
                    cargarDatos(); 
                }
            }
        }

        function gestionarGPSPersistente() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(
                (pos) => {
                    ultimaLat = pos.coords.latitude.toFixed(6);
                    ultimaLon = pos.coords.longitude.toFixed(6);
                    document.getElementById('tempLat').value = ultimaLat;
                    document.getElementById('tempLon').value = ultimaLon;
                    document.getElementById('gpsLabel').innerText = "📍 GPS: SEÑAL FIJADA";
                    document.getElementById('gpsBar').classList.remove('gps-searching');
                    document.getElementById('gpsCoords').innerText = `${ultimaLat}, ${ultimaLon}`;
                },
                () => {
                    document.getElementById('gpsLabel').innerText = "⚠️ BUSCANDO SATÉLITES...";
                    document.getElementById('gpsBar').classList.add('gps-searching');
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        function getFechaActual() {
            const d = new Date();
            const dia = d.getDate().toString().padStart(2, '0');
            const mes = (d.getMonth() + 1).toString().padStart(2, '0');
            const anio = d.getFullYear();
            return `'${dia}/${mes}/${anio}`;
        }

        function getHoraActual() {
            const d = new Date();
            const horas = d.getHours().toString().padStart(2, '0');
            const minutos = d.getMinutes().toString().padStart(2, '0');
            const segundos = d.getSeconds().toString().padStart(2, '0');
            return `'${horas}:${minutos}:${segundos}`;
        }

        function actualizarReloj() {
            const ahora = new Date();
            const h = ahora.getHours().toString().padStart(2, '0');
            const m = ahora.getMinutes().toString().padStart(2, '0');
            const s = ahora.getSeconds().toString().padStart(2, '0');
            const dia = ahora.getDate().toString().padStart(2, '0');
            const mes = (ahora.getMonth() + 1).toString().padStart(2, '0');
            const anio = ahora.getFullYear();
            
            document.getElementById('txtHora').innerText = `${h}:${m}:${s}`;
            document.getElementById('txtFecha').innerText = `${dia}/${mes}/${anio}`;
        }

        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        async function cargarDatos() {
            const statusDiv = document.getElementById('serverStatus');
            try {
                if (!navigator.onLine) throw new Error("Offline");

                statusDiv.innerText = "🟠 DESCARGANDO BASE DE DATOS...";
                statusDiv.className = "server-status-bar server-loading";

                const ts = new Date().getTime();
                const response = await fetch(`${SCRIPT_URL}?t=${ts}`);
                if (!response.ok) throw new Error("Error Servidor");
                
                const data = await response.json();
                localStorage.setItem('localDB', JSON.stringify(data));
                procesarDatosJSON(data);

                statusDiv.innerText = "🟢 LISTO PARA REGISTRAR";
                statusDiv.className = "server-status-bar server-online";

            } catch (e) {
                const localData = localStorage.getItem('localDB');
                if (localData) {
                    procesarDatosJSON(JSON.parse(localData));
                    statusDiv.innerText = "⚠️ MODO OFFLINE ACTIVO";
                    statusDiv.className = "server-status-bar server-offline";
                } else {
                    statusDiv.innerText = "🔴 SIN DATOS LOCALES. NECESITA INTERNET 1 VEZ.";
                    statusDiv.className = "server-status-bar server-offline";
                    setTimeout(cargarDatos, 5000);
                }
            }
        }

        function procesarDatosJSON(data) {
            wb = XLSX.utils.book_new();
            wb.SheetNames = Object.keys(data);
            wb.SheetNames.forEach(name => {
                const ws = XLSX.utils.aoa_to_sheet(data[name]);
                wb.Sheets[name] = ws;
            });

            // Mantener integridad de las hojas que espera el servidor aunque no las usemos aquí
            if (!wb.Sheets["Hoja 3"]) XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([[]]), "Hoja 3");
            if (!wb.Sheets["MOV_AIR"]) XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([[]]), "MOV_AIR");

            datosAires = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, raw: false });
        }

        function actualizarPrefijoID() {
            const tipo = document.getElementById('new_tipo').value;
            const inputID = document.getElementById('new_id_air');
            if (tipo === "ELECTRICO") inputID.value = "AIRELEC-SO";
            else if (tipo === "MECANICO") inputID.value = "AIRMEC-SO";
            else inputID.value = "";
            inputID.focus();
        }

        async function confirmarRegistro() {
            const idAir = document.getElementById('new_id_air').value.trim();
            const marca = document.getElementById('new_marca').value;
            
            if (!idAir || !marca) {
                return alert("⚠️ Por favor, complete al menos la Marca y el ID del Aireador.");
            }

            if (confirm(`¿Proceder a registrar el equipo: ${idAir}?`)) {
                
                const lat = document.getElementById('tempLat').value;
                const lon = document.getElementById('tempLon').value;
                const fechaActualFormat = getFechaActual();
                const horaActualFormat = getHoraActual();

                // 1. Extraer los datos actuales de la primera hoja
                let hojaActual = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, raw: false });
                
                // 2. Limpiar filas vacías al final
                while (hojaActual.length > 0 && (!hojaActual[hojaActual.length - 1] || hojaActual[hojaActual.length - 1].length === 0 || !hojaActual[hojaActual.length - 1][0] || hojaActual[hojaActual.length - 1][0].toString().trim() === "")) {
                    hojaActual.pop();
                }

                // 3. Agregar la nueva fila
                hojaActual.push([
                    idAir, 
                    document.getElementById('new_serie').value, 
                    document.getElementById('new_marca').value, 
                    document.getElementById('new_modelo').value, 
                    document.getElementById('new_ubicacion').value, 
                    document.getElementById('new_tipo').value, 
                    lat, 
                    lon, 
                    "", // I
                    "", // J
                    fechaActualFormat, // K
                    horaActualFormat   // L
                ]);

                // 4. Guardar datos
                datosAires = hojaActual;
                
                // 5. Limpiar Formulario y Borrador
                localStorage.removeItem('borradorNuevoAireador');
                document.getElementById('new_marca').value = "";
                document.getElementById('new_modelo').value = "";
                document.getElementById('new_serie').value = "";
                document.getElementById('new_tipo').value = "";
                document.getElementById('new_ubicacion').value = "";
                document.getElementById('new_id_air').value = "";

                await aplicarGuardado("✅ ¡Aireador guardado en la memoria!");
            }
        }

        async function aplicarGuardado(msj) {
            try {
                wb.Sheets[wb.SheetNames[0]] = XLSX.utils.aoa_to_sheet(datosAires);
                
                let payload = {};
                wb.SheetNames.forEach(name => {
                    payload[name] = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, raw: true });
                });

                localStorage.setItem('localDB', JSON.stringify(payload));

                if (navigator.onLine) {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify(payload)
                    });
                    if(msj) alert(msj + "\nSincronizado con el servidor principal.");
                } else {
                    let cola = JSON.parse(localStorage.getItem('pendingPayloads') || "[]");
                    cola.push(payload);
                    localStorage.setItem('pendingPayloads', JSON.stringify(cola));
                    alert(msj + "\n⚠️ Estás OFFLINE. Se enviará a la nube cuando regrese el internet.");
                }

            } catch (e) {
                console.error(e);
                alert("❌ Error al procesar el guardado.");
            }
        }
    </script>
</body>
</html>
